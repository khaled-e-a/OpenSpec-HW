<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drag & Drop Dashboard</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .dashboard-app { display: flex; flex-direction: column; height: 100vh; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .dashboard-header h1 { margin: 0; font-size: 20px; }
        .edit-toggle { padding: 8px 16px; border: 1px solid #1890ff; border-radius: 4px; background: #fff; color: #1890ff; cursor: pointer; font-size: 14px; }
        .edit-toggle.active { background: #1890ff; color: #fff; }
        .widget { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .widget-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; cursor: grab; }
        .widget-content { padding: 16px; }
        .widget-error { color: #ff4d4f; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load React from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX transformation (must be before type="text/babel" scripts) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load the built UMD library -->
    <script src="../dist/index.umd.js"></script>

    <script type="text/babel">
        const { useState } = React;
        const {
            DashboardProvider, DashboardGrid,
            WidgetRegistryProvider, useWidgetRegistry,
            useDashboard,
            DndContext, DragOverlay,
        } = DragDropDashboardGrid;

        // Widget components
        const WeatherWidget = () => (
            <div>
                <h3 style={{margin: '0 0 8px'}}>Weather</h3>
                <p style={{margin: 0, fontSize: 32}}>72°F</p>
                <p style={{margin: '4px 0 0', color: '#666'}}>Partly Cloudy — San Francisco</p>
            </div>
        );

        const ChartWidget = () => (
            <div>
                <h3 style={{margin: '0 0 8px'}}>Chart</h3>
                <div style={{height: 80, background: 'linear-gradient(135deg,#667eea,#764ba2)', borderRadius: 4, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff'}}>
                    Data Visualization
                </div>
            </div>
        );

        const WIDGET_REGISTRY = [
            {
                component: WeatherWidget,
                metadata: { type: 'weather', name: 'Weather Widget', description: 'Current weather', version: '1.0.0', category: 'utilities', tags: ['weather'], minSize: {width:2,height:2}, defaultSize: {width:3,height:2}, lifecycle: 'active' },
            },
            {
                component: ChartWidget,
                metadata: { type: 'chart', name: 'Chart Widget', description: 'Data visualization', version: '1.0.0', category: 'analytics', tags: ['chart'], minSize: {width:3,height:2}, defaultSize: {width:4,height:3}, lifecycle: 'active' },
            },
        ];

        const INITIAL_WIDGETS = [
            { id: 'widget-1', type: 'weather', position: { x: 0, y: 0 }, size: { width: 3, height: 2 } },
            { id: 'widget-2', type: 'chart',   position: { x: 3, y: 0 }, size: { width: 4, height: 3 } },
            { id: 'widget-3', type: 'weather', position: { x: 7, y: 0 }, size: { width: 3, height: 2 } },
        ];

        // Inner app — uses context hooks, must be inside DashboardProvider + WidgetRegistryProvider
        const DashboardApp = () => {
            const { widgets, moveWidget, resizeWidget, isEditMode, setEditMode } = useDashboard();
            const [activeId, setActiveId] = useState(null);

            const handleDragEnd = ({ active, over }) => {
                setActiveId(null);
                if (!over) return;
                const { widget } = active.data.current || {};
                const { x, y } = over.data.current || {};
                if (widget && x !== undefined) {
                    moveWidget(widget.id, { x, y });
                }
            };

            return (
                <div className="dashboard-app">
                    <header className="dashboard-header">
                        <h1>Drag & Drop Dashboard</h1>
                        <button className={`edit-toggle ${isEditMode ? 'active' : ''}`} onClick={() => setEditMode(!isEditMode)}>
                            {isEditMode ? 'Exit Edit Mode' : 'Edit Mode'}
                        </button>
                    </header>
                    <DndContext onDragStart={e => setActiveId(e.active.id)} onDragEnd={handleDragEnd}>
                        <DashboardGrid
                            widgets={widgets}
                            isEditMode={isEditMode}
                            onWidgetMove={moveWidget}
                            onWidgetResize={resizeWidget}
                        />
                        <DragOverlay>
                            {activeId ? <div style={{padding:16,background:'#fff',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>Widget {activeId}</div> : null}
                        </DragOverlay>
                    </DndContext>
                </div>
            );
        };

        // Bridges WidgetRegistry lookup into DashboardProvider
        const AppContent = () => {
            const { getWidget } = useWidgetRegistry();
            const getWidgetComponent = (type) => getWidget(type)?.component || null;
            return (
                <DashboardProvider initialWidgets={INITIAL_WIDGETS} getWidgetComponent={getWidgetComponent}>
                    <DashboardApp />
                </DashboardProvider>
            );
        };

        const App = () => (
            <WidgetRegistryProvider initialWidgets={WIDGET_REGISTRY}>
                <AppContent />
            </WidgetRegistryProvider>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
