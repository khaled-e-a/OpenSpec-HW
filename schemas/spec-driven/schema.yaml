name: spec-driven
version: 1
description: Default OpenSpec workflow - proposal → usecases → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: usecases
    generates: usecases.md
    description: Use cases capturing actor goals, scenarios, and extensions
    template: usecases.md
    instruction: |
      Create use cases based on the proposal, following Cockburn's methodology.

      For each capability or user-facing goal identified in the proposal,
      write a use case that captures:
      - WHO interacts with the system (primary actor)
      - WHAT they want to achieve (goal)
      - HOW the interaction unfolds (main success scenario, 3-9 steps)
      - WHAT can go wrong (extensions/alternate flows)

      CRITICAL: After writing all use cases, create the "Use Case Traceability Mapping"
      section with a table of ALL use case steps. This centralized mapping will be
      referenced by specs, design, and tasks.

      Guidelines (from "Writing Effective Use Cases"):
      - Title should be an active-verb goal phrase (e.g., "Register new user")
      - Each step shows a goal succeeding - highlight the actor's intention, not UI details
      - Use simple grammar: "Actor does X. System responds with Y."
      - Keep the GUI out - describe intent, not button clicks
      - Steps should show who has the ball (which actor is acting)
      - Write from a bird's eye view, not from inside the system
      - Extensions should list what the system detects, not "checks"

      Levels:
      - Summary (cloud/kite): multi-session goals spanning days/weeks
      - User goal (sea level): single-sitting goals that deliver value
      - Subfunction (fish/clam): partial goals supporting user-goal use cases

      Most use cases should be at User goal level.
      Start with the main success scenario, then brainstorm extensions.
      Each use case is a potential test case - make scenarios concrete and verifiable.

      Final Step - Create Traceability Mapping:
      1. After all use cases are written, add "Use Case Traceability Mapping" section
      2. Create table with ALL use case steps (UC1-S1, UC1-S2, UC1-E1a, etc.)
      3. Copy each step description into the table
      4. This table becomes the single source of truth for downstream artifacts
    requires:
      - proposal

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      CRITICAL: Each requirement MUST map to specific use case steps from usecases.md.

      Mapping Requirements:
      1. Read the "Use Case Traceability Mapping" section in usecases.md
      2. Create requirements that implement each use case step for your capability
      3. Use format: "**Implements**: UC1-S1 - [step description from mapping table]"
      4. Ensure every main scenario step has at least one requirement
      5. Map extensions to specific requirements when applicable

      Use Case to Spec Mapping Process:
      1. Reference the centralized mapping in usecases.md "Use Case Traceability Mapping"
      2. Copy step descriptions from the mapping table
      3. Create requirements that implement each step
      4. Reference the UC step in each requirement using the centralized descriptions

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ## Use Case Traceability
      This spec implements the following use case steps:
      - UC1-S2: System displays drag preview
      - UC1-E2a: Invalid drop position

      ## ADDED Requirements

      ### Requirement: Show drag preview
      **Implements**: UC1-S2 - System displays drag preview
      The system SHALL display a visual preview of the dragged item during drag operations.

      #### Scenario: Drag preview visible
      - **WHEN** user starts dragging an item
      - **THEN** system shows a semi-transparent copy of the item under cursor

      ### Requirement: Validate drop position
      **Implements**: UC1-E2a - Invalid drop position
      The system SHALL prevent dropping items in invalid locations.

      #### Scenario: Invalid drop location
      - **WHEN** user attempts to drop item outside valid drop zone
      - **THEN** system reverts drag operation and shows error message
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - usecases

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      CRITICAL: Each design decision MUST address specific use case steps from usecases.md.

      Use Case to Design Mapping Requirements:
      1. Read the "Use Case Traceability Mapping" section in usecases.md
      2. Reference the centralized step descriptions from the mapping table
      3. For each technical decision, add "**Addresses**: UC1-S1 - [step description from table]"
      4. Ensure every main scenario step has corresponding design consideration
      5. Map extensions to design decisions when they affect technical approach
      6. List any unaddressed use case steps and explain why

      Design Process:
      1. Use the centralized "Use Case Traceability Mapping" in usecases.md
      2. Copy step descriptions from the mapping table for consistency
      3. Write technical decisions that explicitly support the mapped use case steps
      4. Validate all steps are covered before finalizing

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Use Case Coverage**: Map all use case steps to design sections
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale and use case mapping
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.
      Each technical decision should explicitly support the use cases it addresses.

      Good design docs explain the "why" behind technical decisions and how they enable user goals.
    requires:
      - usecases

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      CRITICAL: Each task MUST reference specific use case steps from usecases.md.

      Use Case to Task Mapping Requirements:
      1. Read the "Use Case Traceability Mapping" section in usecases.md
      2. Reference the centralized step descriptions from the mapping table
      3. For each task, add "(Addresses: UC1-S1)" or "(Addresses: UC1-S1, UC1-S2)" for multiple steps
      4. Ensure every main scenario step is addressed by at least one task
      5. Map extensions to tasks when they represent implementation work
      6. Tasks can address multiple use case steps if they are closely related

      Task Mapping Process:
      1. Use the centralized "Use Case Traceability Mapping" in usecases.md
      2. Copy step descriptions from the mapping table for consistency
      3. Create tasks that implement each step
      4. Reference the UC step(s) in each task using (Addresses: UCx-Sy) format
      5. Group related tasks under appropriate headings
      6. Validate all steps are covered before finalizing

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Each task MUST include use case mapping: `- [ ] X.Y Task description (Addresses: UC1-S1)`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Example:
      ```
      ## Use Case Traceability
      This implementation addresses the following use case steps:
      - UC1-S1: User navigates to registration page
      - UC1-S2: System displays registration form
      - UC1-S3: User enters registration details
      - UC1-E2a: Invalid email format

      ## 1. Frontend Implementation

      - [ ] 1.1 Create registration page component (Addresses: UC1-S1)
      - [ ] 1.2 Build registration form with validation (Addresses: UC1-S2, UC1-S3)
      - [ ] 1.3 Add email format validation (Addresses: UC1-E2a)

      ## 2. Backend Implementation

      - [ ] 2.1 Create registration API endpoint (Addresses: UC1-S3)
      - [ ] 2.2 Implement email validation service (Addresses: UC1-E2a)
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
      Each task must map to specific use case steps to ensure complete implementation.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
